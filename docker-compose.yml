version: "3.9"

services:
  kvstore:
    build: .
    container_name: kvstore
    ports:
      - "6379:6379"
    restart: unless-stopped
    environment:
      - PORT=6379
      - THREADS=8
      - LRU_CAPACITY=1000
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -q1 localhost 6379 | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
